name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      # Inject Entra tenant ID into staticwebapp.config.json before build
      - name: Patch staticwebapp.config.json with tenant ID
        run: |
          sed -i "s|YOUR_TENANT_ID|${{ secrets.ENTRA_TENANT_ID }}|g" staticwebapp.config.json
          echo "Patched staticwebapp.config.json:"
          cat staticwebapp.config.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install API dependencies
        run: cd api && npm ci

      - name: Build frontend
        run: npm run build

      - name: Build API
        run: cd api && npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "/"
          api_location: "api"
          output_location: "dist"
          skip_app_build: true   # we built manually above
          skip_api_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Environment
    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
